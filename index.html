<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Je Garage Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .page { display: none; }
    .page.active { display: block; }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .modal-bg { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">

  <!-- LOGIN SCREEN -->
  <div id="auth-screen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 to-slate-800 p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md fade-in">
      <div class="text-center mb-6">
        <div class="w-14 h-14 bg-gradient-to-br from-amber-400 to-orange-500 rounded-xl flex items-center justify-center text-white font-bold text-xl mx-auto mb-3">JG</div>
        <h1 class="text-2xl font-bold">Je Garage Pro</h1>
        <p class="text-slate-500 text-sm">Masuk untuk mengelola bengkel</p>
      </div>
      <form id="login-form" class="space-y-4">
        <input type="email" id="email" placeholder="Email" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-amber-500 outline-none">
        <input type="password" id="password" placeholder="Password" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-amber-500 outline-none">
        <button type="submit" class="w-full bg-gradient-to-r from-amber-500 to-orange-500 text-white py-3 rounded-xl font-semibold hover:shadow-lg transition">Masuk</button>
        <p id="login-error" class="text-red-500 text-sm text-center hidden"></p>
      </form>
    </div>
  </div>

  <!-- APP SCREEN -->
  <div id="app-screen" class="hidden min-h-screen flex flex-col md:flex-row">
    <!-- Sidebar -->
    <aside class="w-full md:w-64 bg-slate-900 text-white p-4 md:fixed md:h-full z-10">
      <div class="flex items-center gap-3 mb-8 px-2">
        <div class="w-10 h-10 bg-gradient-to-br from-amber-400 to-orange-500 rounded-xl flex items-center justify-center font-bold">JG</div>
        <div><h1 class="font-bold">Je Garage Pro</h1><p class="text-xs text-slate-400">Premium</p></div>
      </div>
      <nav class="space-y-2">
        <button onclick="showPage('dashboard')" class="nav-btn w-full text-left px-4 py-3 rounded-xl bg-amber-500/20 text-amber-400 border border-amber-500/30">📊 Dashboard</button>
        <button onclick="showPage('customers')" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-white/10 text-slate-300">👥 Pelanggan</button>
        <button onclick="showPage('transactions')" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-white/10 text-slate-300">💰 Transaksi</button>
        <button onclick="showPage('receivables')" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-white/10 text-slate-300">📝 Piutang</button>
      </nav>
      <button onclick="logout()" class="mt-8 w-full text-left px-4 py-3 rounded-xl hover:bg-red-500/20 text-red-400">🚪 Logout</button>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 md:ml-64 p-4 md:p-8">
      <!-- Dashboard -->
      <div id="dashboard" class="page active fade-in">
        <h2 class="text-2xl font-bold mb-6">Dashboard</h2>
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
          <div class="bg-white p-5 rounded-2xl shadow border border-gray-100"><p class="text-sm text-slate-500">Pemasukan</p><p id="stat-income" class="text-xl font-bold text-emerald-600">Rp 0</p></div>
          <div class="bg-white p-5 rounded-2xl shadow border border-gray-100"><p class="text-sm text-slate-500">Pengeluaran</p><p id="stat-expense" class="text-xl font-bold text-red-600">Rp 0</p></div>
          <div class="bg-white p-5 rounded-2xl shadow border border-gray-100"><p class="text-sm text-slate-500">Piutang</p><p id="stat-receivable" class="text-xl font-bold text-amber-600">Rp 0</p></div>
          <div class="bg-white p-5 rounded-2xl shadow border border-gray-100"><p class="text-sm text-slate-500">Saldo Bersih</p><p id="stat-balance" class="text-xl font-bold text-slate-800">Rp 0</p></div>
        </div>
        <button onclick="showPage('transactions')" class="bg-slate-800 text-white px-6 py-3 rounded-xl hover:bg-slate-700 transition">➕ Tambah Transaksi</button>
      </div>

      <!-- Customers -->
      <div id="customers" class="page fade-in">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-2xl font-bold">Pelanggan</h2>
          <button onclick="openModal('customer')" class="bg-amber-500 text-white px-4 py-2 rounded-xl hover:bg-amber-600 transition">➕ Tambah</button>
        </div>
        <div id="customer-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
      </div>

      <!-- Transactions -->
      <div id="transactions" class="page fade-in">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-2xl font-bold">Transaksi</h2>
          <button onclick="openModal('transaction')" class="bg-amber-500 text-white px-4 py-2 rounded-xl hover:bg-amber-600 transition">➕ Tambah</button>
        </div>
        <div id="transaction-list" class="space-y-3"></div>
      </div>

      <!-- Receivables -->
      <div id="receivables" class="page fade-in">
        <h2 class="text-2xl font-bold mb-6">Daftar Piutang</h2>
        <div id="receivable-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
      </div>
    </main>
  </div>

  <!-- MODAL -->
  <div id="modal" class="fixed inset-0 modal-bg hidden z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-6 fade-in">
      <h3 id="modal-title" class="text-xl font-bold mb-4"></h3>
      <form id="modal-form" class="space-y-4"></form>
      <div class="flex gap-3 mt-6">
        <button onclick="closeModal()" class="flex-1 py-2 border border-gray-200 rounded-xl hover:bg-gray-50">Batal</button>
        <button id="modal-submit" class="flex-1 py-2 bg-amber-500 text-white rounded-xl hover:bg-amber-600 font-medium">Simpan</button>
      </div>
    </div>
  </div>

  <!-- FIREBASE & LOGIC -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 🔑 PASTE CONFIG FIREBASE ANDA DI BAWAH INI
    const firebaseConfig = {
      apiKey: "AIzaSyBV5lzmVOF40QoNrq4zpcrytXgeLYjmFkQ",
  authDomain: "je-garage-pro.firebaseapp.com",
  projectId: "je-garage-pro",
  storageBucket: "je-garage-pro.firebasestorage.app",
  messagingSenderId: "970616261539",
  appId: "1:970616261539:web:6a21358b4405c1cb782816"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let currentUser = null;

    // UTILS
    const formatRupiah = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n);
    const show = (id) => document.getElementById(id).classList.remove('hidden');
    const hide = (id) => document.getElementById(id).classList.add('hidden');

    // AUTH
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        hide('auth-screen'); show('app-screen');
        loadDashboard(); loadCustomers(); loadTransactions(); loadReceivables();
      } else {
        currentUser = null;
        show('auth-screen'); hide('app-screen');
      }
    });

    document.getElementById('login-form').onsubmit = async (e) => {
      e.preventDefault();
      try {
        await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
      } catch (err) {
        const el = document.getElementById('login-error');
        el.textContent = err.message.includes('auth/') ? 'Email atau password salah' : 'Gagal masuk';
        el.classList.remove('hidden');
      }
    };

    window.logout = () => signOut(auth);

    // NAVIGATION
    window.showPage = (id) => {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      document.querySelectorAll('.nav-btn').forEach(b => {
        b.classList.remove('bg-amber-500/20', 'text-amber-400', 'border', 'border-amber-500/30');
        b.classList.add('hover:bg-white/10', 'text-slate-300');
      });
      event.target.classList.add('bg-amber-500/20', 'text-amber-400', 'border', 'border-amber-500/30');
    };

    // FIRESTORE CRUD
    window.loadData = async (col, filter = {}) => {
      if (!currentUser) return [];
      let q = query(collection(db, 'users', currentUser.uid, col));
      if (filter.where) q = query(q, where(filter.where.field, filter.where.op, filter.where.value));
      if (filter.order) q = query(q, orderBy(filter.order, 'desc'));
      return (await getDocs(q)).docs.map(d => ({ id: d.id, ...d.data() }));
    };

    window.addData = async (col, data) => addDoc(collection(db, 'users', currentUser.uid, col), { ...data, createdAt: serverTimestamp() });
    window.updateData = async (col, id, data) => updateDoc(doc(db, 'users', currentUser.uid, col, id), data);
    window.deleteData = async (col, id) => deleteDoc(doc(db, 'users', currentUser.uid, col, id));

    // DASHBOARD
    async function loadDashboard() {
      const tx = await loadData('transactions', { order: 'date' });
      let inc = 0, exp = 0;
      tx.forEach(t => { if(t.type==='income') inc += t.amount; if(t.type==='expense') exp += t.amount; });
      const rec = (await loadData('receivables', { where: { field: 'isPaid', op: '==', value: false } })).reduce((s,r) => s+r.amount, 0);
      document.getElementById('stat-income').textContent = formatRupiah(inc);
      document.getElementById('stat-expense').textContent = formatRupiah(exp);
      document.getElementById('stat-receivable').textContent = formatRupiah(rec);
      document.getElementById('stat-balance').textContent = formatRupiah(inc - exp);
    }

    // CUSTOMERS
    async function loadCustomers() {
      const list = await loadData('customers', { order: 'createdAt' });
      const container = document.getElementById('customer-list');
      container.innerHTML = list.length ? list.map(c => `
        <div class="bg-white p-4 rounded-xl shadow border border-gray-100 fade-in">
          <h3 class="font-bold truncate">${c.name}</h3>
          <p class="text-sm text-slate-500">📞 ${c.phone}</p>
          <button onclick="deleteData('customers','${c.id}').then(()=>loadCustomers())" class="mt-2 text-xs text-red-500 hover:underline">Hapus</button>
        </div>
      `).join('') : '<p class="text-slate-400 col-span-3 text-center py-8">Belum ada pelanggan</p>';
    }

    // TRANSACTIONS
    async function loadTransactions() {
      const list = await loadData('transactions', { order: 'date' });
      const container = document.getElementById('transaction-list');
      container.innerHTML = list.length ? list.map(t => `
        <div class="bg-white p-4 rounded-xl shadow border-l-4 ${t.type==='income'?'border-emerald-500':'border-red-500'} fade-in flex justify-between items-center">
          <div><p class="font-semibold">${t.description}</p><p class="text-xs text-slate-500">${t.category} • ${t.date}</p></div>
          <p class="font-bold ${t.type==='income'?'text-emerald-600':'text-red-600'}">${formatRupiah(t.amount)}</p>
        </div>
      `).join('') : '<p class="text-slate-400 text-center py-8">Belum ada transaksi</p>';
    }

    // RECEIVABLES
    async function loadReceivables() {
      const list = await loadData('receivables', { where: { field: 'isPaid', op: '==', value: false } });
      const container = document.getElementById('receivable-list');
      container.innerHTML = list.length ? list.map(r => `
        <div class="bg-white p-4 rounded-xl shadow border border-amber-200 bg-amber-50/30 fade-in">
          <p class="font-bold text-lg">${formatRupiah(r.amount)}</p>
          <p class="text-sm text-slate-600 mt-1">${r.notes || 'Piutang'}</p>
          <button onclick="updateData('receivables','${r.id}',{isPaid:true}).then(()=>loadReceivables())" class="mt-3 bg-emerald-500 text-white px-3 py-1 rounded-lg text-sm hover:bg-emerald-600">✅ Tandai Lunas</button>
        </div>
      `).join('') : '<p class="text-slate-400 text-center py-8">Tidak ada piutang</p>';
    }

    // MODAL & FORMS
    window.openModal = (type) => {
      const form = document.getElementById('modal-form');
      document.getElementById('modal-title').textContent = type === 'customer' ? 'Tambah Pelanggan' : 'Tambah Transaksi';
      if (type === 'customer') {
        form.innerHTML = `
          <input id="f-name" placeholder="Nama" required class="w-full px-4 py-3 rounded-xl border border-gray-200">
          <input id="f-phone" placeholder="Telepon" required class="w-full px-4 py-3 rounded-xl border border-gray-200">
        `;
      } else {
        form.innerHTML = `
          <select id="f-type" class="w-full px-4 py-3 rounded-xl border border-gray-200">
            <option value="income">Pemasukan</option><option value="expense">Pengeluaran</option>
          </select>
          <input id="f-amount" type="number" placeholder="Jumlah" required class="w-full px-4 py-3 rounded-xl border border-gray-200">
          <input id="f-desc" placeholder="Deskripsi" required class="w-full px-4 py-3 rounded-xl border border-gray-200">
          <input id="f-date" type="date" required class="w-full px-4 py-3 rounded-xl border border-gray-200">
        `;
        document.getElementById('f-date').valueAsDate = new Date();
      }
      document.getElementById('modal-submit').onclick = async () => {
        if (type === 'customer') {
          await addData('customers', { name: document.getElementById('f-name').value, phone: document.getElementById('f-phone').value });
          loadCustomers();
        } else {
          await addData('transactions', {
            type: document.getElementById('f-type').value,
            amount: Number(document.getElementById('f-amount').value),
            description: document.getElementById('f-desc').value,
            date: document.getElementById('f-date').value,
            category: 'Umum'
          });
          // Auto create receivable if expense
          if(document.getElementById('f-type').value === 'income' && confirm('Buat piutang untuk transaksi ini?')) {
            await addData('receivables', { amount: Number(document.getElementById('f-amount').value), notes: document.getElementById('f-desc').value, dueDate: new Date(Date.now()+30*24*60*60*1000).toISOString().split('T')[0], isPaid: false });
            loadReceivables();
          }
          loadTransactions(); loadDashboard();
        }
        closeModal();
      };
      show('modal');
    };

    window.closeModal = () => hide('modal');
  </script>
</body>
</html>
